<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Website{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

        nav {
            background: #2c3e50;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .logo { color: white; font-size: 22px; font-weight: bold; text-decoration: none; }
        nav ul { list-style: none; display: flex; gap: 25px; }
        nav ul a { color: #ecf0f1; text-decoration: none; font-size: 15px; transition: color 0.3s; }
        nav ul a:hover { color: #3498db; }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        footer {
            text-align: center;
            padding: 20px;
            background: #2c3e50;
            color: #aaa;
            margin-top: 60px;
            font-size: 14px;
        }
    </style>
    {% block style %}{% endblock %}
</head>
<body>
    <nav>
        <a href="/" class="logo">🌐 MyWeb</a>
        <ul>
            <li><a href="/">Trang chủ</a></li>
            <li><a href="/about">Giới thiệu</a></li>
            <li><a href="/contact">Liên hệ</a></li>
        </ul>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>© 2025 MyWeb. Made with ❤️ using Flask</p>
    </footer>
</body>
</html>
