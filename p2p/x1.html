<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Node Mesh — Data Fabric v2.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c10;
            --surface: #0d1117;
            --surface2: #161b22;
            --border: #21262d;
            --accent: #00ff88;
            --accent2: #00b4ff;
            --accent3: #ff6b35;
            --warn: #ffd700;
            --text: #e6edf3;
            --muted: #7d8590;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        #app { position: relative; z-index: 1; padding: 24px; max-width: 1400px; margin: 0 auto; }

        header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 28px; padding-bottom: 16px;
            border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px;
        }

        .logo { font-size: 1.5em; font-weight: 800; letter-spacing: -0.5px; color: var(--accent); }
        .logo span { color: var(--text); }

        .pulse {
            width: 10px; height: 10px; border-radius: 50%; background: var(--accent);
            box-shadow: 0 0 0 0 rgba(0,255,136,0.5); animation: ping 2s infinite;
        }
        .pulse.offline { background: #ff4c4c; animation: none; }

        @keyframes ping { 0% { box-shadow: 0 0 0 0 rgba(0,255,136,0.6); } 70% { box-shadow: 0 0 0 8px rgba(0,255,136,0); } 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0); } }

        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        @media (max-width: 900px) { .dashboard { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .dashboard { grid-template-columns: 1fr; } }

        .metric-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
            padding: 18px 20px; position: relative; overflow: hidden;
        }
        .metric-card:hover { border-color: var(--accent); }
        .metric-value { font-size: 2.4em; font-weight: 800; line-height: 1; }
        .metric-value.green { color: var(--accent); }
        .metric-value.blue { color: var(--accent2); }

        .panel {
            background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
        }
        .panel-header {
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            font-family: 'Share Tech Mono', monospace; font-size: 0.78em;
            color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
        }

        #data-display, #merged-data {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.82em; color: #a8d4a0; padding: 16px;
            height: 380px; overflow-y: auto; white-space: pre-wrap;
            background: var(--bg);
        }

        .btn {
            padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer;
            font-weight: 700; font-size: 0.85em; transition: all 0.15s;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #00e07a; }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

        .thread-pill {
            display: flex; align-items: center; gap: 6px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 5px 12px; font-size: 0.73em;
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="logo">P2P<span>MESH</span> <small style="font-size:0.55em;color:var(--muted);">DATA FABRIC v2.2 — WebRTC Merge</small></div>
        <div style="display:flex;align-items:center;gap:8px;font-family:monospace;font-size:0.85em;">
            <div class="pulse" id="conn-dot"></div>
            <span id="conn-label">Đang khởi động...</span>
        </div>
    </header>

    <div class="dashboard">
        <div class="metric-card"><div class="metric-label">Nodes Online</div><div class="metric-value green" id="m-nodes">0</div></div>
        <div class="metric-card"><div class="metric-label">Merged Size</div><div class="metric-value blue" id="m-merged">0 KB</div></div>
        <div class="metric-card"><div class="metric-label">Peers Connected</div><div class="metric-value" id="m-peers">0</div></div>
        <div class="metric-card"><div class="metric-label">Sync Count</div><div class="metric-value" id="m-syncs">0</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
        <div class="panel">
            <div class="panel-header">🔍 URL SCANNER & MERGER</div>
            <div style="padding:16px;">
                <input type="text" id="scan-url" placeholder="Dán URL trang web chứa link Firebase..." style="width:100%;padding:12px;margin-bottom:8px;background:var(--bg);border:1px solid var(--border);color:white;border-radius:6px;">
                <button class="btn btn-primary" onclick="startScanning()">🔎 Quét & Merge Dữ Liệu</button>
                <button class="btn btn-secondary" onclick="clearAllData()" style="margin-left:8px;">Xóa Dữ Liệu</button>
            </div>
            <div id="scan-log" style="padding:10px 16px;font-family:monospace;font-size:0.8em;color:#ffdd88;height:180px;overflow:auto;background:#0a0e14;"></div>
        </div>

        <div class="panel">
            <div class="panel-header">🌐 WEBRTC P2P SHARING</div>
            <div style="padding:16px;">
                <button class="btn btn-primary" onclick="createRoom()">📢 Tạo Room Chia Sẻ</button>
                <button class="btn btn-secondary" onclick="joinRoomPrompt()" style="margin-left:8px;">🔗 Tham Gia Room</button>
                <div id="webrtc-status" style="margin-top:12px;font-size:0.85em;color:var(--accent);"></div>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            📦 MERGED DATA (Toàn bộ dữ liệu từ nhiều DB)
            <button class="btn btn-secondary" style="float:right;padding:4px 12px;font-size:0.75em;" onclick="downloadMerged()">⬇ Tải File</button>
        </div>
        <pre id="merged-data">Chưa có dữ liệu merged...</pre>
    </div>
</div>

<script type="module">
    // ==================== STATE ====================
    let mergedData = {};
    let peers = [];
    let roomCode = null;
    let peerConnection = null;
    let dataChannel = null;

    const State = {
        nodeId: 'node_' + Date.now().toString(36),
        totalBytes: 0,
        syncCount: 0,
        firebaseApps: {}
    };

    // ==================== UTILS ====================
    function log(msg, color = '#88ffaa') {
        const logEl = document.getElementById('scan-log');
        const time = new Date().toLocaleTimeString('vi-VN');
        logEl.innerHTML += `<span style="color:#666">[${time}]</span> <span style="color:${color}">${msg}</span><br>`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    function formatBytes(bytes) {
        if (!bytes) return '0 B';
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
        return (bytes/(1024*1024)).toFixed(2) + ' MB';
    }

    // ==================== FIREBASE MERGER ====================
    async function fetchFirebaseData(dbUrl) {
        try {
            const response = await fetch(`${dbUrl}/.json`);
            if (!response.ok) throw new Error('Không thể truy cập DB');
            const data = await response.json();
            log(`✅ Đã lấy dữ liệu từ: ${dbUrl.split('//')[1].split('.')[0]}`, '#00ff88');
            return data;
        } catch (e) {
            log(`❌ Lỗi lấy ${dbUrl}: ${e.message}`, '#ff6666');
            return null;
        }
    }

    async function startScanning() {
        const input = document.getElementById('scan-url').value.trim();
        if (!input) {
            log("Vui lòng nhập URL trang web hoặc Firebase DB", '#ffdd88');
            return;
        }

        log("🔍 Bắt đầu quét và merge dữ liệu...", '#ffd700');

        let urls = [];

        // Nếu là link Firebase trực tiếp
        if (input.includes('firebasedatabase.app')) {
            urls = [input];
        } 
        // Nếu là trang web → giả lập quét (thực tế cần backend hoặc CORS proxy)
        else {
            log("⚠️ Hiện chỉ hỗ trợ link Firebase trực tiếp. Đang dùng link mẫu...", '#ffaa00');
            // Thêm nhiều link Firebase mẫu (bạn có thể thay bằng link thật)
            urls = [
                "https://khoanchitrongngay-default-rtdb.asia-southeast1.firebasedatabase.app",
                input // người dùng nhập
            ];
        }

        mergedData = { mergedAt: new Date().toISOString(), sources: [], data: {} };

        for (const url of urls) {
            const data = await fetchFirebaseData(url);
            if (data) {
                mergedData.sources.push(url);
                // Merge shallow (có thể cải tiến thành deep merge sau)
                Object.assign(mergedData.data, data);
            }
        }

        const jsonStr = JSON.stringify(mergedData, null, 2);
        const size = new TextEncoder().encode(jsonStr).length;

        document.getElementById('merged-data').textContent = jsonStr;
        document.getElementById('m-merged').textContent = formatBytes(size);
        State.totalBytes = size;
        State.syncCount++;

        log(`🎉 Merge hoàn tất! Kích thước: ${formatBytes(size)}`, '#00ffcc');

        // Broadcast qua WebRTC nếu có peer
        if (dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(JSON.stringify({ type: 'merged_data', data: mergedData }));
            log("📤 Đã gửi dữ liệu merged qua WebRTC", '#00b4ff');
        }
    }

    // ==================== WEBRTC P2P ====================
    async function createRoom() {
        roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
        log(`📢 Room được tạo: <strong>${roomCode}</strong> — Chia sẻ mã này cho người khác`, '#00ff88');

        // Simple WebRTC (demo - thực tế nên dùng signaling server như Socket.IO hoặc PeerJS)
        peerConnection = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });

        dataChannel = peerConnection.createDataChannel('dataChannel');
        setupDataChannel();

        peerConnection.onicecandidate = e => {
            if (e.candidate) console.log("ICE Candidate:", e.candidate);
        };

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);

        document.getElementById('webrtc-status').innerHTML = 
            `✅ Room: <strong>${roomCode}</strong><br>Đang chờ peer kết nối...`;
    }

    function joinRoomPrompt() {
        const code = prompt("Nhập Room Code:");
        if (!code) return;
        log(`🔗 Đang tham gia room: ${code}`, '#00b4ff');
        // Thực tế cần signaling server để exchange SDP
        alert("Phiên bản demo: WebRTC cần signaling server để hoạt động đầy đủ.\n\nHiện chỉ mô phỏng.");
    }

    function setupDataChannel() {
        dataChannel.onopen = () => {
            log("🔗 Kết nối WebRTC thành công!", '#00ff88');
            document.getElementById('webrtc-status').innerHTML += "<br>✅ Peer Connected";
        };

        dataChannel.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === 'merged_data') {
                    mergedData = msg.data;
                    document.getElementById('merged-data').textContent = JSON.stringify(mergedData, null, 2);
                    log("📥 Nhận được dữ liệu merged từ peer", '#00b4ff');
                }
            } catch(e) {}
        };
    }

    function downloadMerged() {
        if (Object.keys(mergedData).length === 0) {
            alert("Chưa có dữ liệu để tải!");
            return;
        }
        const blob = new Blob([JSON.stringify(mergedData, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `merged_p2p_data_${Date.now()}.json`;
        a.click();
        log("⬇️ Đã tải file merged", '#88ffaa');
    }

    function clearAllData() {
        if (confirm("Xóa toàn bộ dữ liệu đã merge?")) {
            mergedData = {};
            document.getElementById('merged-data').textContent = "Dữ liệu đã được xóa.";
            log("🗑 Dữ liệu đã xóa", '#ff6666');
        }
    }

    // ==================== INIT ====================
    window.addEventListener('load', () => {
        log("🚀 P2P Node Mesh v2.2 — WebRTC Data Fabric khởi động...", '#00ffcc');
        document.getElementById('conn-label').textContent = `Node ${State.nodeId.slice(0,12)} • Ready`;
        
        // Demo: Tự động quét một URL mẫu sau 1.5s
        setTimeout(() => {
            document.getElementById('scan-url').value = "https://khoanchitrongngay-default-rtdb.asia-southeast1.firebasedatabase.app";
            // startScanning(); // Uncomment nếu muốn tự động chạy
        }, 1500);
    });

    // Expose functions to window
    window.startScanning = startScanning;
    window.createRoom = createRoom;
    window.joinRoomPrompt = joinRoomPrompt;
    window.downloadMerged = downloadMerged;
    window.clearAllData = clearAllData;
</script>

</body>
</html>
