<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Node Mesh — Data Fabric v2.7</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #00ff88; }
        body {
            font-family: 'Syne', system-ui, sans-serif;
            background: #0a0c10;
            color: #e6edf3;
        }
        .mono { font-family: 'Share Tech Mono', monospace; }
        .glass { background: rgba(13, 17, 23, 0.92); backdrop-filter: blur(12px); }
        .pulse { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
        pre { scrollbar-width: thin; scrollbar-color: #00ff88 #1f2937; }
    </style>
</head>
<body class="min-h-screen">
<div id="app" class="max-w-7xl mx-auto p-6">

    <!-- HEADER -->
    <header class="flex justify-between items-center mb-10 border-b border-gray-800 pb-6">
        <div>
            <h1 class="text-4xl font-bold tracking-tighter">
                P2P<span class="text-emerald-400">MESH</span>
                <span class="text-xs align-super ml-2 text-gray-500">v2.7</span>
            </h1>
            <p class="text-emerald-400/80 text-sm mono" id="user-status">
                User: <span id="role-badge" class="text-gray-400">Guest</span>
            </p>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-3 mono text-sm">
                <div class="w-3 h-3 bg-emerald-400 rounded-full pulse"></div>
                <span id="conn-label">Node Ready</span>
            </div>
            <button onclick="showLoginModal()" 
                    class="px-5 py-2 bg-gray-800 hover:bg-gray-700 rounded-xl text-sm">
                👤 Login Admin
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
        <div class="glass border border-gray-700 rounded-2xl p-6">
            <div class="text-xs mono text-gray-400 mb-1">NODES ONLINE</div>
            <div id="m-nodes" class="text-5xl font-bold text-emerald-400">1</div>
        </div>
        <div class="glass border border-gray-700 rounded-2xl p-6">
            <div class="text-xs mono text-gray-400 mb-1">MERGED SIZE</div>
            <div id="m-merged" class="text-5xl font-bold text-sky-400">0 KB</div>
        </div>
        <div class="glass border border-gray-700 rounded-2xl p-6">
            <div class="text-xs mono text-gray-400 mb-1">PEERS</div>
            <div id="m-peers" class="text-5xl font-bold">0</div>
        </div>
        <div class="glass border border-gray-700 rounded-2xl p-6">
            <div class="text-xs mono text-gray-400 mb-1">SYNC COUNT</div>
            <div id="m-syncs" class="text-5xl font-bold">0</div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- LEFT PANEL -->
        <div class="lg:col-span-8 space-y-8">
            <!-- CRAWL PANEL - Chỉ hiển thị khi là Admin -->
            <div id="crawl-panel" class="glass border border-emerald-500/30 rounded-3xl overflow-hidden hidden">
                <div class="px-8 py-5 border-b border-gray-700 bg-black/40 flex items-center justify-between">
                    <h2 class="text-lg font-semibold flex items-center gap-3">🔍 DEEP CRAWL ENGINE (Admin Only)</h2>
                </div>
                <div class="p-8">
                    <input id="main-db-url" type="text" 
                           class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-500 mono text-sm"
                           value="https://khoanchitrongngay-default-rtdb.asia-southeast1.firebasedatabase.app">
                    <button onclick="startDeepCrawl()" 
                            class="mt-4 w-full bg-emerald-500 hover:bg-emerald-600 transition-colors text-black font-bold py-4 rounded-2xl text-lg">
                        🚀 BẮT ĐẦU DEEP CRAWL & MERGE
                    </button>
                </div>
                <div id="scan-log" class="mono text-xs bg-black/60 h-64 overflow-auto p-6 border-t border-gray-700 text-emerald-300"></div>
            </div>

            <!-- MERGED DATA -->
            <div class="glass border border-gray-700 rounded-3xl overflow-hidden">
                <div class="px-8 py-5 border-b border-gray-700 bg-black/40 flex justify-between items-center">
                    <h2 class="text-lg font-semibold">📦 MERGED DATA</h2>
                    <button onclick="downloadMerged()" 
                            class="px-6 py-2 bg-gray-800 hover:bg-gray-700 rounded-xl text-sm">↓ Tải JSON</button>
                </div>
                <pre id="merged-data" class="p-8 text-emerald-200/90 text-sm overflow-auto max-h-[520px] bg-[#0a0c10]">
Chưa có dữ liệu merged. 
Hãy tham gia một Room để nhận dữ liệu từ Admin.
                </pre>
            </div>
        </div>

        <!-- RIGHT PANEL: WEBRTC -->
        <div class="lg:col-span-4">
            <div class="glass border border-gray-700 rounded-3xl p-8 sticky top-6">
                <h2 class="text-lg font-semibold mb-6 flex items-center gap-3">🌐 WEBRTC P2P SHARING</h2>
                
                <div class="space-y-4">
                    <button onclick="createRoom()" 
                            class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-black font-bold rounded-2xl transition">
                        📢 TẠO ROOM MỚI
                    </button>
                    <button onclick="joinRoom()" 
                            class="w-full py-4 bg-gray-800 hover:bg-gray-700 border border-gray-600 rounded-2xl transition">
                        🔗 THAM GIA ROOM
                    </button>
                </div>

                <div id="webrtc-status" class="mt-8 mono text-xs bg-black/50 p-5 rounded-2xl min-h-[180px] text-sky-300"></div>
            </div>
        </div>
    </div>
</div>

<!-- LOGIN MODAL -->
<div id="login-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass border border-emerald-500/30 rounded-3xl p-10 w-full max-w-md">
        <h2 class="text-3xl font-bold text-center mb-2">Admin Login</h2>
        <p class="text-center text-gray-400 mono text-sm mb-8">Chỉ Admin mới có quyền quét & merge dữ liệu</p>
        
        <div class="space-y-6">
            <div>
                <label class="block text-xs mono text-gray-400 mb-2">USERNAME</label>
                <input id="username" type="text" value="admin" 
                       class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-xs mono text-gray-400 mb-2">PASSWORD</label>
                <input id="password" type="password" value="admin"
                       class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-500">
            </div>

            <button onclick="handleLogin()" 
                    class="w-full bg-emerald-500 hover:bg-emerald-600 transition-colors text-black font-bold py-4 rounded-2xl text-lg">
                ĐĂNG NHẬP ADMIN
            </button>

            <button onclick="closeLoginModal()" 
                    class="w-full text-gray-400 hover:text-white transition-colors py-3">
                Đóng
            </button>
        </div>
    </div>
</div>

<script type="module">
    // ====================== CONFIG ======================
    const SIGNALING_DB = "https://lotrinhchuyendi-default-rtdb.europe-west1.firebasedatabase.app";
    const DEFAULT_DB = "https://khoanchitrongngay-default-rtdb.asia-southeast1.firebasedatabase.app";

    // ====================== STATE ======================
    let isAdmin = false;
    let mergedData = { mergedAt: null, sources: [], data: {} };
    let peerConnection = null;
    let dataChannel = null;
    let roomId = null;
    let peersCount = 0;

    const State = {
        nodeId: 'node_' + Date.now().toString(36).substr(2, 10),
        totalBytes: 0,
        syncCount: 0
    };

    // ====================== UTILS ======================
    function log(msg, color = '#67e8a5') {
        const el = document.getElementById('scan-log');
        if (!el) return;
        const time = new Date().toLocaleTimeString('vi-VN');
        el.innerHTML += `<span class="text-gray-500">[${time}]</span> <span style="color:${color}">${msg}</span><br>`;
        el.scrollTop = el.scrollHeight;
    }

    function formatBytes(bytes) {
        if (!bytes) return '0 B';
        const units = ['B','KB','MB','GB'];
        let i = 0;
        while (bytes >= 1024 && i < units.length-1) { bytes /= 1024; i++; }
        return bytes.toFixed(i < 2 ? 1 : 2) + ' ' + units[i];
    }

    function updateMetrics() {
        document.getElementById('m-merged').textContent = formatBytes(State.totalBytes);
        document.getElementById('m-syncs').textContent = State.syncCount;
        document.getElementById('m-peers').textContent = peersCount;
    }

    function deepMerge(target, source) {
        for (const key in source) {
            if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
                if (!target[key]) target[key] = {};
                deepMerge(target[key], source[key]);
            } else {
                target[key] = source[key];
            }
        }
        return target;
    }

    // ====================== AUTH ======================
    function showLoginModal() {
        document.getElementById('login-modal').classList.remove('hidden');
        document.getElementById('username').focus();
    }

    function closeLoginModal() {
        document.getElementById('login-modal').classList.add('hidden');
    }

    function handleLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (username === 'admin' && password === 'admin') {
            isAdmin = true;
            document.getElementById('role-badge').textContent = 'ADMIN';
            document.getElementById('role-badge').className = 'text-emerald-400';
            document.getElementById('crawl-panel').classList.remove('hidden');
            closeLoginModal();
            log("✅ Đăng nhập Admin thành công. Bạn có quyền Deep Crawl.", '#34d399');
        } else {
            alert("❌ Sai tài khoản hoặc mật khẩu!\n\nAdmin: admin / admin");
        }
    }

    // ====================== DEEP CRAWL (Admin Only) ======================
    async function fetchJSON(url) {
        try {
            const res = await fetch(url.endsWith('.json') ? url : `${url}/.json`);
            return res.ok ? await res.json() : null;
        } catch (e) { return null; }
    }

    function extractFirebaseURLs(obj, results = new Set(), depth = 0) {
        if (depth > 12) return results;
        if (!obj || typeof obj !== 'object') return results;

        if (Array.isArray(obj)) {
            obj.forEach(item => extractFirebaseURLs(item, results, depth + 1));
            return results;
        }

        for (const key in obj) {
            const val = obj[key];
            if (typeof val === 'string' && val.includes('firebasedatabase.app')) {
                results.add(val.replace(/\/+$/, ''));
            } else if (val && typeof val === 'object') {
                extractFirebaseURLs(val, results, depth + 1);
            }
        }
        return results;
    }

    async function startDeepCrawl() {
        if (!isAdmin) {
            alert("Chỉ Admin mới có quyền thực hiện Deep Crawl & Merge!");
            return;
        }

        const mainUrl = (document.getElementById('main-db-url').value.trim() || DEFAULT_DB).replace(/\/$/, '');
        log(`🚀 ADMIN DEEP CRAWL bắt đầu từ: ${mainUrl}`, '#a5f3fc');

        const rootData = await fetchJSON(mainUrl);
        if (!rootData) {
            log("❌ Không thể truy cập DB gốc", '#f87171');
            return;
        }

        const discovered = extractFirebaseURLs(rootData);
        const allDBs = [mainUrl, ...Array.from(discovered)].filter((v, i, a) => a.indexOf(v) === i);

        log(`🔍 Phát hiện ${allDBs.length} database`, '#67e8a5');

        mergedData = { mergedAt: new Date().toISOString(), sources: [], data: {} };

        for (let i = 0; i < allDBs.length; i++) {
            const dbUrl = allDBs[i];
            log(`[${i+1}/${allDBs.length}] Merging → ${dbUrl.split('//')[1].split('.')[0]}`, '#bae6fd');
            const data = await fetchJSON(dbUrl);
            if (data) {
                mergedData.sources.push(dbUrl);
                deepMerge(mergedData.data, data);
            }
        }

        const finalJSON = JSON.stringify(mergedData, null, 2);
        State.totalBytes = new TextEncoder().encode(finalJSON).length;
        State.syncCount++;

        document.getElementById('merged-data').textContent = finalJSON;
        updateMetrics();

        log(`🎉 DEEP MERGE HOÀN TẤT — ${formatBytes(State.totalBytes)}`, '#34d399');

        if (dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(JSON.stringify({ type: 'merged_update', payload: mergedData }));
        }
    }

    // ====================== WEBRTC ======================
    async function createRoom() {
        roomId = 'room_' + Math.random().toString(36).substring(2, 10).toUpperCase();
        log(`📢 Room tạo thành công: <b>${roomId}</b>`, '#67e8a5');

        peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        dataChannel = peerConnection.createDataChannel("mesh_data_v2");
        setupDataChannel();

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);

        await fetch(`${SIGNALING_DB}/rooms/${roomId}/offer.json`, {
            method: 'PUT',
            body: JSON.stringify(peerConnection.localDescription)
        });

        document.getElementById('webrtc-status').innerHTML = `Room ID: <span class="text-emerald-400 font-bold">${roomId}</span><br>Chia sẻ mã này cho người khác.`;
    }

    async function joinRoom() {
        const code = prompt("Nhập Room ID để tham gia:");
        if (!code) return;

        roomId = code;
        log(`🔗 Đang tham gia room: ${roomId}`, '#bae6fd');

        peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        peerConnection.ondatachannel = (e) => {
            dataChannel = e.channel;
            setupDataChannel();
        };

        const offerRes = await fetch(`${SIGNALING_DB}/rooms/${roomId}/offer.json`);
        const offer = await offerRes.json();

        if (offer) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            await fetch(`${SIGNALING_DB}/rooms/${roomId}/answer.json`, {
                method: 'PUT',
                body: JSON.stringify(answer)
            });
        }
    }

    function setupDataChannel() {
        dataChannel.onopen = () => {
            peersCount++;
            updateMetrics();
            log("✅ WebRTC Peer đã kết nối", '#34d399');
        };

        dataChannel.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                if (msg.type === 'merged_update') {
                    mergedData = msg.payload;
                    document.getElementById('merged-data').textContent = JSON.stringify(mergedData, null, 2);
                    State.totalBytes = new TextEncoder().encode(JSON.stringify(mergedData)).length;
                    updateMetrics();
                    log("📥 Nhận được dữ liệu merged từ Admin", '#67e8a5');
                }
            } catch (_) {}
        };
    }

    function downloadMerged() {
        if (Object.keys(mergedData.data || {}).length === 0) {
            alert("Chưa có dữ liệu merged để tải về!");
            return;
        }
        const blob = new Blob([JSON.stringify(mergedData, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `p2p_merged_data_${Date.now()}.json`;
        a.click();
    }

    // ====================== INIT ======================
    window.addEventListener('load', () => {
        document.getElementById('conn-label').textContent = `Node ${State.nodeId} • LIVE`;
        log("🚀 P2P Node Mesh v2.7 khởi động thành công", '#67e8a5');
        log("Mọi người đều có thể tham gia Room để nhận dữ liệu.", '#a1a1aa');
    });

    // Expose functions
    window.showLoginModal = showLoginModal;
    window.closeLoginModal = closeLoginModal;
    window.handleLogin = handleLogin;
    window.startDeepCrawl = startDeepCrawl;
    window.createRoom = createRoom;
    window.joinRoom = joinRoom;
    window.downloadMerged = downloadMerged;
</script>
</body>
</html>
